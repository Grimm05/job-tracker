# docker-compose.yml  (racine du repo)

services:

  postgres:
    image: postgres:16-alpine
    container_name: jobtracker-db
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobtracker-net

  backend:
    build:
      context: ./job-tracker-backend
      dockerfile: Dockerfile
    container_name: jobtracker-backend
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      APP_JWT_SECRET:             ${JWT_SECRET}
      APP_JWT_EXPIRATION:         ${JWT_EXPIRATION}
      SPRING_PROFILES_ACTIVE:     prod
    ports:
      - "${BACKEND_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy   # attend que Postgres soit prêt
    networks:
      - jobtracker-net

  frontend:
    build:
      context: ./job-tracker-frontend
      dockerfile: Dockerfile
    container_name: jobtracker-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - jobtracker-net

volumes:
  postgres_data:

networks:
  jobtracker-net:
    driver: bridge